<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Viking Flappy</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #141a2e;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
    font-family: 'Tahoma', sans-serif;
  }
  #wrap {
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="wrap"><canvas id="game"></canvas></div>
<script>
'use strict';

// ============================================================
//  VIKING FLAPPY — pixel-art flappy game, Norse theme
//  แตะ / คลิก / Space เพื่อกระพือบิน
// ============================================================

const W = 300, H = 520;
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = W;
canvas.height = H;
ctx.imageSmoothingEnabled = false;

function fitCanvas() {
  const s = Math.min(window.innerWidth / W, window.innerHeight / H);
  if (!(s > 0)) return; // hidden tab / zero viewport — keep last size
  canvas.style.width  = Math.floor(W * s) + 'px';
  canvas.style.height = Math.floor(H * s) + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// ============================================================
//  SPRITES
// ============================================================
const SPRITES = [
  'raven_glide', 'raven_up', 'raven_down',
  'totem_top_wood', 'totem_bottom_wood', 'totem_top_stone', 'totem_bottom_stone',
  'coin', 'ground_tile',
  'shield_gold', 'shield_silver', 'shield_bronze'
];
const img = {};
let loaded = 0;
for (const name of SPRITES) {
  const im = new Image();
  im.src = 'assets/' + name + '.png';
  im.onload = () => loaded++;
  im.onerror = () => loaded++;
  img[name] = im;
}

const TOTEM_W = 52, TOTEM_H = 160;
const RAVEN_W = 30, RAVEN_H = 28;

// ============================================================
//  AUDIO (WebAudio chiptune, no files)
// ============================================================
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type, vol, slideTo, delay) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay || 0);
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = type || 'square';
  osc.frequency.setValueAtTime(freq, t0);
  if (slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(vol || 0.15, t0);
  g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
  osc.connect(g).connect(audioCtx.destination);
  osc.start(t0);
  osc.stop(t0 + dur);
}
function sfxFlap()  { beep(480, 0.09, 'triangle', 0.18, 850); }
function sfxScore() { beep(880, 0.07, 'square', 0.10); beep(1320, 0.10, 'square', 0.10, 0, 0.07); }
function sfxCoin()  { beep(1568, 0.06, 'square', 0.10); beep(2093, 0.12, 'square', 0.10, 0, 0.05); }
function sfxHit()   { beep(200, 0.25, 'sawtooth', 0.25, 55); }
function sfxHorn()  {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  [110, 165, 220].forEach((f, i) => {
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.07, t0 + 0.15);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.9 + i * 0.05);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + 1.1);
  });
}

// ============================================================
//  MUSIC — เพลงไวกิ้งแต่งเองในโค้ด (original, ไม่มีปัญหาลิขสิทธิ์)
//  war drums + low drone + A-minor melody, 8-bar loop @ 96 BPM
// ============================================================
let musicGain = null, noiseBuf = null;
const music = {
  on: localStorage.getItem('viking-flap-music') !== '0',
  started: false,
  step: 0,
  nextT: 0
};
const STEP_DUR = 60 / 96 / 4; // 16th note @ 96 BPM

const A4 = 440, B4 = 493.88, C5 = 523.25, D5 = 587.33, E5 = 659.25,
      G4 = 392, E4 = 329.63;
// 8 bars x 8 eighth-notes (0 = rest)
const MELODY = [
  A4,0,C5,0,B4,A4,G4,0,   E4,0,G4,0,A4,0,0,0,
  A4,0,C5,0,D5,0,E5,0,    D5,C5,B4,0,A4,0,0,0,
  E5,0,D5,0,C5,0,B4,0,    C5,0,B4,0,A4,0,0,0,
  G4,0,A4,0,B4,0,C5,B4,   A4,0,0,0,A4,0,0,0
];
const MELODY_STEPS = MELODY.length * 2; // length in 16ths

function initMusicNodes() {
  musicGain = audioCtx.createGain();
  musicGain.gain.value = music.on ? 1 : 0;
  musicGain.connect(audioCtx.destination);
  // noise buffer (drum skin texture)
  noiseBuf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.3), audioCtx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  // continuous low drone: detuned saws through a lowpass
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 320;
  const dg = audioCtx.createGain();
  dg.gain.value = 0.04;
  [110, 110.6, 220.4].forEach(f => {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth';
    o.frequency.value = f;
    o.connect(lp);
    o.start();
  });
  lp.connect(dg).connect(musicGain);
}

function drum(t, freq, dur, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(freq, t);
  o.frequency.exponentialRampToValueAtTime(Math.max(30, freq * 0.35), t + dur);
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(musicGain);
  o.start(t);
  o.stop(t + dur);
  const n = audioCtx.createBufferSource();
  n.buffer = noiseBuf;
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass';
  hp.frequency.value = 900;
  const ng = audioCtx.createGain();
  ng.gain.setValueAtTime(vol * 0.3, t);
  ng.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  n.connect(hp).connect(ng).connect(musicGain);
  n.start(t);
  n.stop(t + 0.08);
}

function melodyNote(t, freq, dur, vol) {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'triangle';
  o.frequency.value = freq;
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(musicGain);
  o.start(t);
  o.stop(t + dur + 0.05);
  // soft octave-down double for warmth
  const o2 = audioCtx.createOscillator();
  const g2 = audioCtx.createGain();
  o2.type = 'square';
  o2.frequency.value = freq / 2;
  g2.gain.setValueAtTime(0.0001, t);
  g2.gain.exponentialRampToValueAtTime(vol * 0.22, t + 0.02);
  g2.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o2.connect(g2).connect(musicGain);
  o2.start(t);
  o2.stop(t + dur + 0.05);
}

function startMusic() {
  if (music.started || !audioCtx) return;
  music.started = true;
  initMusicNodes();
  music.nextT = audioCtx.currentTime + 0.1;
  setInterval(scheduleMusic, 90);
}

function scheduleMusic() {
  if (!audioCtx) return;
  while (music.nextT < audioCtx.currentTime + 0.25) {
    const s = music.step % MELODY_STEPS;
    // war drums: heavy on each beat, ghost hit before the bar line
    if (s % 4 === 0) drum(music.nextT, 130, 0.22, s % 16 === 0 ? 0.28 : 0.16);
    if (s % 16 === 14) drum(music.nextT, 180, 0.10, 0.10);
    // melody on eighth notes
    if (s % 2 === 0) {
      const f = MELODY[s / 2];
      if (f) melodyNote(music.nextT, f, STEP_DUR * 2.4, 0.08);
    }
    music.step++;
    music.nextT += STEP_DUR;
  }
}

function toggleMusic() {
  music.on = !music.on;
  localStorage.setItem('viking-flap-music', music.on ? '1' : '0');
  ensureAudio();
  if (music.on && !music.started) startMusic();
  if (musicGain && audioCtx) musicGain.gain.setTargetAtTime(music.on ? 1 : 0, audioCtx.currentTime, 0.05);
}

// ============================================================
//  GAME STATE
// ============================================================
const ST_READY = 0, ST_PLAY = 1, ST_DEAD = 2;
let state = ST_READY;

const GRAVITY      = 1150;  // px/s^2
const FLAP_VY      = -305;  // px/s
const PIPE_SPEED   = 112;   // px/s
const PIPE_GAP     = 138;
const PIPE_SPACING = 172;
const GROUND_H     = 48;
const GROUND_Y     = H - GROUND_H;
const BIRD_X       = 80;
const BIRD_R       = 11;

let raven, pillars, coins, score, coinCount, best, groundX, deathTimer, shake, newBest;
best = +(localStorage.getItem('viking-flap-best') || 0);

function reset() {
  raven = { y: H * 0.4, vy: 0, rot: 0, wing: 0 };
  pillars = [];
  coins = [];
  score = 0;
  coinCount = 0;
  groundX = 0;
  deathTimer = 0;
  shake = 0;
  newBest = false;
  particles.length = 0;
}

function spawnPillar(x) {
  const margin = 52;
  const topLen = margin + Math.random() * (GROUND_Y - PIPE_GAP - margin * 2);
  const type = Math.random() < 0.5 ? 'wood' : 'stone';
  pillars.push({ x, top: topLen, type, passed: false });

  // coins: in the gap, or floating between pillar pairs (like the mockup)
  const roll = Math.random();
  if (roll < 0.35) {
    coins.push({ x: x + TOTEM_W / 2, y: topLen + PIPE_GAP / 2, taken: false, phase: Math.random() * 6 });
  } else if (roll < 0.75) {
    const cy = 110 + Math.random() * (GROUND_Y - 220);
    const cx = x - PIPE_SPACING / 2;
    coins.push({ x: cx, y: cy, taken: false, phase: Math.random() * 6 });
    if (Math.random() < 0.5) coins.push({ x: cx + 34, y: cy, taken: false, phase: Math.random() * 6 });
  }
}

// ============================================================
//  PARTICLES
// ============================================================
const particles = [];
const snow = [];
for (let i = 0; i < 40; i++) {
  snow.push({
    x: Math.random() * W,
    y: Math.random() * H,
    r: Math.random() < 0.5 ? 1 : 2,
    sp: 14 + Math.random() * 26,
    drift: Math.random() * Math.PI * 2
  });
}
function burst(x, y, color, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 40 + Math.random() * 150;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 70,
      life: 0.4 + Math.random() * 0.5,
      t: 0, color,
      size: Math.random() < 0.5 ? 2 : 3
    });
  }
}

reset();

// ============================================================
//  INPUT
// ============================================================
function flap() {
  ensureAudio();
  if (music.on) startMusic();
  if (state === ST_READY) {
    state = ST_PLAY;
    sfxHorn();
    spawnPillar(W + 60);
  }
  if (state === ST_PLAY) {
    raven.vy = FLAP_VY;
    raven.wing = 1;
    sfxFlap();
  } else if (state === ST_DEAD && deathTimer > 0.6) {
    reset();
    state = ST_READY;
  }
}
const MUTE_BTN = { x: W - 30, y: 8, w: 22, h: 22 };
function pointerDown(clientX, clientY) {
  const r = canvas.getBoundingClientRect();
  const px = (clientX - r.left) * (W / r.width);
  const py = (clientY - r.top) * (H / r.height);
  if (px >= MUTE_BTN.x - 5 && px <= MUTE_BTN.x + MUTE_BTN.w + 5 &&
      py >= MUTE_BTN.y - 5 && py <= MUTE_BTN.y + MUTE_BTN.h + 5) {
    ensureAudio();
    toggleMusic();
    return;
  }
  flap();
}
// listen on the whole window so taps on the letterbox area work too
window.addEventListener('mousedown', (e) => pointerDown(e.clientX, e.clientY));
window.addEventListener('touchstart', (e) => {
  e.preventDefault();
  const t = e.touches[0];
  if (t) pointerDown(t.clientX, t.clientY);
}, { passive: false });
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  if (e.code === 'KeyM') toggleMusic();
});

// ============================================================
//  UPDATE
// ============================================================
function update(dt) {
  for (const s of snow) {
    s.y += s.sp * dt;
    s.drift += dt;
    s.x += Math.sin(s.drift) * 9 * dt;
    if (s.y > H) { s.y = -3; s.x = Math.random() * W; }
  }
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.t += dt;
    if (p.t >= p.life) { particles.splice(i, 1); continue; }
    p.vy += 700 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
  if (shake > 0) shake = Math.max(0, shake - dt * 26);

  if (state === ST_READY) {
    raven.y = H * 0.4 + Math.sin(performance.now() / 300) * 6;
    raven.rot = 0;
    raven.wing = (Math.sin(performance.now() / 130) + 1) / 2;
    groundX = (groundX - PIPE_SPEED * dt) % 32;
    return;
  }

  if (state === ST_PLAY) {
    raven.vy += GRAVITY * dt;
    raven.y += raven.vy * dt;
    raven.wing = Math.max(0, raven.wing - dt * 4);
    const target = Math.max(-0.4, Math.min(1.2, raven.vy / 420));
    raven.rot += (target - raven.rot) * Math.min(1, dt * 10);

    groundX = (groundX - PIPE_SPEED * dt) % 32;

    for (const p of pillars) p.x -= PIPE_SPEED * dt;
    for (const c of coins) c.x -= PIPE_SPEED * dt;
    if (pillars.length && pillars[pillars.length - 1].x < W - PIPE_SPACING) {
      spawnPillar(W + TOTEM_W);
    }
    while (pillars.length && pillars[0].x + TOTEM_W < -10) pillars.shift();
    while (coins.length && coins[0].x < -30) coins.shift();

    // score: pass a pillar
    for (const p of pillars) {
      if (!p.passed && p.x + TOTEM_W < BIRD_X - BIRD_R) {
        p.passed = true;
        score++;
        sfxScore();
        checkBest();
      }
    }

    // collect coins
    for (const c of coins) {
      if (!c.taken) {
        const dx = c.x - BIRD_X, dy = c.y - raven.y;
        if (dx * dx + dy * dy < 24 * 24) {
          c.taken = true;
          score++;
          coinCount++;
          sfxCoin();
          burst(c.x, c.y, '#f0c53f', 10);
          checkBest();
        }
      }
    }

    if (raven.y < BIRD_R) { raven.y = BIRD_R; raven.vy = 0; }

    if (raven.y > GROUND_Y - BIRD_R) {
      raven.y = GROUND_Y - BIRD_R;
      die();
    }
    for (const p of pillars) {
      if (circleRect(BIRD_X, raven.y, BIRD_R, p.x + 4, 0, TOTEM_W - 8, p.top) ||
          circleRect(BIRD_X, raven.y, BIRD_R, p.x + 4, p.top + PIPE_GAP, TOTEM_W - 8, GROUND_Y - p.top - PIPE_GAP)) {
        die();
        break;
      }
    }
  }

  if (state === ST_DEAD) {
    deathTimer += dt;
    if (raven.y < GROUND_Y - BIRD_R) {
      raven.vy += GRAVITY * dt;
      raven.y = Math.min(GROUND_Y - BIRD_R, raven.y + raven.vy * dt);
      raven.rot = Math.min(1.6, raven.rot + dt * 5);
    }
  }
}

function checkBest() {
  if (score > best) {
    best = score;
    newBest = true;
    localStorage.setItem('viking-flap-best', best);
  }
}

function die() {
  if (state === ST_DEAD) return;
  state = ST_DEAD;
  deathTimer = 0;
  shake = 8;
  sfxHit();
  burst(BIRD_X, raven.y, '#3a3f52', 12);
  burst(BIRD_X, raven.y, '#c9d4e2', 8);
}

function circleRect(cx, cy, r, rx, ry, rw, rh) {
  const nx = Math.max(rx, Math.min(cx, rx + rw));
  const ny = Math.max(ry, Math.min(cy, ry + rh));
  const dx = cx - nx, dy = cy - ny;
  return dx * dx + dy * dy < r * r;
}

// ============================================================
//  BACKGROUND (pixel-style, code-drawn to match the mockup)
// ============================================================
const SKY_BANDS = ['#232b47', '#2a3554', '#334162', '#3d4d71', '#485a80', '#54688f'];
function drawBackground(t) {
  // banded sky
  const bandH = Math.ceil(330 / SKY_BANDS.length);
  for (let i = 0; i < SKY_BANDS.length; i++) {
    ctx.fillStyle = SKY_BANDS[i];
    ctx.fillRect(0, i * bandH, W, bandH + 1);
  }

  // stars (twinkle)
  for (let i = 0; i < 24; i++) {
    const sx = (i * 137.5) % W;
    const sy = (i * 71.3) % 180;
    ctx.globalAlpha = 0.3 + 0.6 * Math.abs(Math.sin(t / 800 + i * 1.7));
    ctx.fillStyle = '#e8eef8';
    ctx.fillRect(Math.floor(sx), Math.floor(sy), 2, 2);
  }
  ctx.globalAlpha = 1;

  // aurora — quantized wavy pixel bands
  drawAuroraBand(t, 34,  20, 0.030, 'rgba(80, 190, 170, 0.45)');
  drawAuroraBand(t, 62,  16, 0.024, 'rgba(120, 130, 200, 0.40)');
  drawAuroraBand(t, 96,  18, 0.027, 'rgba(70, 170, 190, 0.35)');
  drawAuroraBand(t, 130, 14, 0.021, 'rgba(90, 120, 180, 0.30)');

  // clouds
  drawCloud(((t * 0.006) % (W + 120)) - 60, 168);
  drawCloud((((t * 0.004) + 200) % (W + 120)) - 60, 210);

  // ice shelf horizon
  const shelfY = 300;
  ctx.fillStyle = '#dfe8f2';
  ctx.fillRect(0, shelfY, W, 40);
  // water below the shelf (fill first, keels drawn on top)
  ctx.fillStyle = '#54688f';
  ctx.fillRect(0, shelfY + 40, W, GROUND_Y - shelfY - 40);
  // iceberg keels (inverted triangles below the shelf)
  ctx.fillStyle = '#c3d2e4';
  drawTriDown(60, shelfY + 40, 70, 70);
  drawTriDown(255, shelfY + 40, 60, 56);
  ctx.fillStyle = '#2c3a5e';
  drawTriDown(160, shelfY + 40, 64, 84);
  drawTriDown(300, shelfY + 40, 50, 60);

  // longship + longhouse on the shelf
  drawLongship(38, shelfY);
  drawLonghouse(178, shelfY);
}

function drawAuroraBand(t, yBase, amp, freq, color) {
  ctx.fillStyle = color;
  for (let x = 0; x < W; x += 6) {
    const y = yBase + Math.round(Math.sin(x * freq + t * 0.0008) * amp / 3) * 3;
    ctx.fillRect(x, y, 6, 13);
  }
}

function drawTriDown(cx, y, w, h) {
  ctx.beginPath();
  ctx.moveTo(cx - w / 2, y);
  ctx.lineTo(cx + w / 2, y);
  ctx.lineTo(cx, y + h);
  ctx.closePath();
  ctx.fill();
}

function drawCloud(x, y) {
  ctx.fillStyle = '#e6edf6';
  ctx.fillRect(x, y, 34, 8);
  ctx.fillRect(x + 6, y - 6, 16, 6);
  ctx.fillRect(x + 38, y + 2, 10, 6);
}

function drawLongship(x, y) {
  // hull
  ctx.fillStyle = '#7a4a28';
  ctx.fillRect(x, y - 10, 56, 6);
  ctx.fillRect(x + 4, y - 4, 48, 4);
  ctx.fillStyle = '#5c3a20';
  ctx.fillRect(x - 4, y - 16, 4, 8);   // stern
  ctx.fillRect(x + 56, y - 16, 4, 8);  // prow
  // shields on the side
  const shieldCols = ['#b03a3a', '#d9b23a', '#b03a3a', '#d9b23a', '#b03a3a'];
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = shieldCols[i];
    ctx.fillRect(x + 6 + i * 10, y - 9, 5, 5);
  }
  // mast + striped sail
  ctx.fillStyle = '#4a3018';
  ctx.fillRect(x + 26, y - 42, 3, 32);
  for (let i = 0; i < 5; i++) {
    ctx.fillStyle = i % 2 ? '#e8e4da' : '#c23b3b';
    ctx.fillRect(x + 12 + i * 6, y - 40, 6, 22);
  }
}

function drawLonghouse(x, y) {
  // walls
  ctx.fillStyle = '#6b4226';
  ctx.fillRect(x, y - 18, 46, 18);
  ctx.fillStyle = '#54341e';
  ctx.fillRect(x + 20, y - 14, 8, 14); // door
  // windows (warm light)
  ctx.fillStyle = '#f0c53f';
  ctx.fillRect(x + 7, y - 12, 5, 5);
  ctx.fillRect(x + 34, y - 12, 5, 5);
  // green turf roof
  ctx.fillStyle = '#3f7048';
  ctx.fillRect(x - 5, y - 24, 56, 7);
  ctx.fillRect(x + 3, y - 29, 40, 5);
  // snow on ridge
  ctx.fillStyle = '#e6edf6';
  ctx.fillRect(x + 12, y - 32, 22, 3);
}

// ============================================================
//  TOTEM PILLARS (sprite, tiled for any length)
// ============================================================
function drawPillar(p) {
  const topImg = img['totem_top_' + p.type];
  const botImg = img['totem_bottom_' + p.type];

  // top pillar: cap at sprite bottom; grows upward
  const hT = Math.round(p.top);
  const x = Math.round(p.x);
  if (hT <= TOTEM_H) {
    ctx.drawImage(topImg, 0, TOTEM_H - hT, TOTEM_W, hT, x, 0, TOTEM_W, hT);
  } else {
    ctx.drawImage(topImg, x, hT - TOTEM_H);
    let rest = hT - TOTEM_H;
    while (rest > 0) {
      const sh = Math.min(96, rest);
      ctx.drawImage(topImg, 0, 0, TOTEM_W, sh, x, rest - sh, TOTEM_W, sh);
      rest -= sh;
    }
  }

  // bottom pillar: cap at sprite top; grows downward
  const by = Math.round(p.top + PIPE_GAP);
  const hB = GROUND_Y - by;
  if (hB <= TOTEM_H) {
    ctx.drawImage(botImg, 0, 0, TOTEM_W, hB, x, by, TOTEM_W, hB);
  } else {
    ctx.drawImage(botImg, x, by);
    let drawn = TOTEM_H;
    while (drawn < hB) {
      const sh = Math.min(96, hB - drawn);
      ctx.drawImage(botImg, 0, TOTEM_H - 96, TOTEM_W, sh, x, by + drawn, TOTEM_W, sh);
      drawn += sh;
    }
  }
}

// ============================================================
//  GROUND
// ============================================================
function drawGround() {
  const gx = Math.round(groundX);
  for (let x = gx - 32; x < W + 32; x += 32) {
    ctx.drawImage(img['ground_tile'], x, GROUND_Y);
  }
}

// ============================================================
//  RAVEN
// ============================================================
function ravenFrame() {
  if (state === ST_DEAD) return img['raven_down'];
  if (raven.wing > 0.55) return img['raven_up'];
  if (raven.wing > 0.15) return img['raven_down'];
  return img['raven_glide'];
}
function drawRaven() {
  ctx.save();
  ctx.translate(BIRD_X, Math.round(raven.y));
  ctx.rotate(raven.rot);
  ctx.drawImage(ravenFrame(), -RAVEN_W / 2, -RAVEN_H / 2);
  ctx.restore();
}

// ============================================================
//  PIXEL DIGIT FONT (3x5, matches mockup score style)
// ============================================================
const DIGITS = {
  '0': ['111','101','101','101','111'],
  '1': ['010','110','010','010','111'],
  '2': ['111','001','111','100','111'],
  '3': ['111','001','111','001','111'],
  '4': ['101','101','111','001','001'],
  '5': ['111','100','111','001','111'],
  '6': ['111','100','111','101','111'],
  '7': ['111','001','010','010','010'],
  '8': ['111','101','111','101','111'],
  '9': ['111','101','111','001','111']
};
function drawPixelNumber(num, cx, y, sc) {
  const str = String(num);
  const dw = 3 * sc, gap = sc;
  const total = str.length * dw + (str.length - 1) * gap;
  let x0 = Math.round(cx - total / 2);
  // outline pass
  for (const pass of [1, 0]) {
    let x = x0;
    for (const ch of str) {
      const rows = DIGITS[ch];
      if (!rows) { x += dw + gap; continue; }
      for (let r = 0; r < 5; r++) {
        for (let c = 0; c < 3; c++) {
          if (rows[r][c] === '1') {
            if (pass) {
              ctx.fillStyle = '#2b2416';
              ctx.fillRect(x + c * sc - 1, y + r * sc - 1, sc + 2, sc + 3);
            } else {
              ctx.fillStyle = '#e8d5a0';
              ctx.fillRect(x + c * sc, y + r * sc, sc, sc);
            }
          }
        }
      }
      x += dw + gap;
    }
  }
}

// ============================================================
//  UI
// ============================================================
function drawTextStroked(text, x, y, size, fill, align) {
  ctx.font = 'bold ' + size + 'px Tahoma, sans-serif';
  ctx.textAlign = align || 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = Math.max(3, size / 7);
  ctx.strokeStyle = 'rgba(20,22,38,0.9)';
  ctx.strokeText(text, x, y);
  ctx.fillStyle = fill;
  ctx.fillText(text, x, y);
}

function drawMuteBtn() {
  const b = MUTE_BTN;
  ctx.fillStyle = 'rgba(20,24,40,0.55)';
  ctx.fillRect(b.x, b.y, b.w, b.h);
  ctx.fillStyle = '#e8d5a0';
  // speaker: box + cone
  ctx.fillRect(b.x + 3, b.y + 8, 3, 6);
  ctx.beginPath();
  ctx.moveTo(b.x + 6, b.y + 11);
  ctx.lineTo(b.x + 11, b.y + 5);
  ctx.lineTo(b.x + 11, b.y + 17);
  ctx.closePath();
  ctx.fill();
  if (music.on) {
    ctx.strokeStyle = '#e8d5a0';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(b.x + 11, b.y + 11, 4.5, -0.8, 0.8);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(b.x + 11, b.y + 11, 8, -0.7, 0.7);
    ctx.stroke();
  } else {
    ctx.strokeStyle = '#c25050';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x + 13, b.y + 7);
    ctx.lineTo(b.x + 19, b.y + 15);
    ctx.moveTo(b.x + 19, b.y + 7);
    ctx.lineTo(b.x + 13, b.y + 15);
    ctx.stroke();
  }
}

function drawUI(t) {
  drawMuteBtn();
  if (state === ST_PLAY) {
    drawPixelNumber(score, W / 2, 34, 7);
  }

  if (state === ST_READY) {
    drawTextStroked('VIKING FLAPPY', W / 2, 110, 30, '#e8d5a0');
    drawTextStroked('ไวกิ้งเหินเวหา', W / 2, 142, 16, '#cfe0f2');
    if (Math.sin(t / 300) > -0.3) {
      drawTextStroked('แตะ / คลิก / SPACE เพื่อบิน', W / 2, H * 0.62, 14, '#ffffff');
    }
    drawTextStroked('สถิติสูงสุด: ' + best, W / 2, H * 0.62 + 28, 12, '#e8d5a0');
    // bobbing tap hand
    const hy = H * 0.62 + 64 + Math.sin(t / 250) * 4;
    ctx.fillStyle = '#e8d5a0';
    ctx.fillRect(W / 2 - 3, hy, 6, 12);
    ctx.fillRect(W / 2 - 8, hy + 8, 16, 8);
  }

  if (state === ST_DEAD && deathTimer > 0.35) {
    // wooden banner panel
    const pw = 230, ph = 168;
    const px = (W - pw) / 2, py = (H - ph) / 2 - 40;
    ctx.fillStyle = '#5c3a20';
    ctx.fillRect(px - 4, py - 4, pw + 8, ph + 8);
    ctx.fillStyle = '#7a4a28';
    ctx.fillRect(px, py, pw, ph);
    // plank lines + nails
    ctx.fillStyle = 'rgba(60,36,18,0.6)';
    for (let i = 1; i < 4; i++) ctx.fillRect(px, py + (ph / 4) * i, pw, 2);
    ctx.fillStyle = '#3c2412';
    [[6, 6], [pw - 10, 6], [6, ph - 10], [pw - 10, ph - 10]].forEach(([nx, ny]) => {
      ctx.fillRect(px + nx, py + ny, 4, 4);
    });

    drawTextStroked('GAME OVER', W / 2, py + 24, 24, '#e8d5a0');

    // medal shield
    const shield = score >= 25 ? 'shield_gold' : score >= 12 ? 'shield_silver' : score >= 5 ? 'shield_bronze' : null;
    if (shield) {
      ctx.drawImage(img[shield], px + 18, py + 52, 68, 68);
    } else {
      drawTextStroked('—', px + 52, py + 86, 30, '#9a7b52');
    }

    drawTextStroked('คะแนน', px + 158, py + 56, 12, '#cfae72');
    drawPixelNumber(score, px + 158, py + 66, 5);
    drawTextStroked('สูงสุด', px + 158, py + 110, 12, '#cfae72');
    drawPixelNumber(best, px + 158, py + 120, 5);

    // coins collected
    ctx.drawImage(img['coin'], px + 26, py + 128, 20, 20);
    drawTextStroked('x ' + coinCount, px + 62, py + 138, 13, '#f0c53f', 'left');

    if (newBest) drawTextStroked('★ สถิติใหม่! ★', W / 2, py + ph + 22, 14, '#7ee8a8');
    if (deathTimer > 0.6 && Math.sin(t / 300) > -0.3) {
      drawTextStroked('แตะเพื่อเล่นอีกครั้ง', W / 2, py + ph + (newBest ? 46 : 28), 14, '#ffffff');
    }
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
let lastT = performance.now();
function frame(now) {
  const dt = Math.min(0.033, (now - lastT) / 1000);
  lastT = now;

  if (loaded < SPRITES.length) {
    ctx.fillStyle = '#232b47';
    ctx.fillRect(0, 0, W, H);
    drawTextStroked('LOADING...', W / 2, H / 2, 18, '#e8d5a0');
    requestAnimationFrame(frame);
    return;
  }

  update(dt);

  ctx.save();
  if (shake > 0) {
    ctx.translate(Math.round((Math.random() - 0.5) * shake), Math.round((Math.random() - 0.5) * shake));
  }

  drawBackground(now);
  for (const p of pillars) drawPillar(p);
  drawGround();

  // coins
  for (const c of coins) {
    if (c.taken) continue;
    const bob = Math.sin(now / 250 + c.phase) * 3;
    ctx.drawImage(img['coin'], Math.round(c.x - 16), Math.round(c.y - 16 + bob));
  }

  // snow
  ctx.fillStyle = 'rgba(240,246,255,0.85)';
  for (const s of snow) {
    ctx.fillRect(Math.round(s.x), Math.round(s.y), s.r, s.r);
  }

  // particles
  for (const p of particles) {
    ctx.globalAlpha = 1 - p.t / p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
  }
  ctx.globalAlpha = 1;

  drawRaven();
  ctx.restore();

  drawUI(now);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
